name: Machine Failure Prediction MLOps Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  check-project:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Show repository files
        run: |
          echo "Current repository structure:"
          ls -R

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check app.py syntax
        run: |
          python -m py_compile app.py

      - name: Check src Python files
        run: |
          find src -name "*.py" -print -exec python -m py_compile {} \;

      - name: Pipeline status
        run: |
          echo "Repository structure and Python files are valid."

      
