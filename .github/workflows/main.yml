name: Machine Failure Prediction MLOps Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  ci-cd-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Show repository structure
        run: |
          echo "Repository files:"
          ls -R

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check app.py syntax
        run: |
          python -m py_compile app.py

      - name: Check src Python files
        run: |
          if [ -d src ]; then
            find src -name "*.py" -print -exec python -m py_compile {} \;
          else
            echo "src folder not found. Skipping src check."
          fi

      - name: Build Docker image
        run: |
          docker build -t machine-failure-prediction .

      - name: Pipeline completed
        run: |
          echo "CI/CD pipeline completed successfully."
