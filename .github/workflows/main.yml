name: Machine Failure Prediction MLOps Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  ci-cd-check-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Show repository structure
        run: |
          ls -R

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install streamlit pandas numpy scikit-learn mlflow joblib matplotlib seaborn xgboost huggingface_hub

      - name: Check app.py syntax
        run: |
          python -m py_compile app.py

      - name: Build Docker image
        run: |
          docker build -t machine-failure-prediction .

      - name: Deploy to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_SPACE_REPO_ID: ${{ vars.HF_SPACE_REPO_ID }}
        run: |
          python - <<'PY'
          import os
          from huggingface_hub import HfApi

          token = os.environ["HF_TOKEN"]
          repo_id = os.environ["HF_SPACE_REPO_ID"]

          api = HfApi(token=token)
          api.upload_folder(
              folder_path=".",
              repo_id=repo_id,
              repo_type="space",
              ignore_patterns=[
                  ".git/*",
                  ".github/*",
                  "__pycache__/*",
                  ".pytest_cache/*",
                  "mlruns/*",
                  "venv/*",
                  ".venv/*"
              ],
          )

          print(f"Uploaded to Hugging Face Space: {repo_id}")
          PY

      - name: Pipeline completed
        run: |
          echo "CI/CD and Hugging Face deployment completed successfully."
